# Nombre de processus Nginx adapte automatiquement au conteneur.
worker_processes auto;

events {
    # Nombre maximum de connexions simultanees par worker.
    worker_connections 1024;
}

http {
    # Types MIME : permet de servir correctement CSS, JS, images, etc.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Optimisations simples pour l'envoi de fichiers statiques.
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Masque la version exacte de Nginx dans les reponses HTTP.
    server_tokens off;

    # Compression des reponses texte pour reduire le poids transfere.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    server {
        # __PORT__ est remplace par docker/start.sh avec la variable PORT
        # fournie par Render. En local, la valeur par defaut est 10000.
        listen __PORT__;
        server_name _;

        # Laravel doit etre servi depuis public/, jamais depuis la racine.
        root /var/www/html/public;
        index index.php index.html;

        # Taille maximale des uploads HTTP.
        client_max_body_size 20m;

        location / {
            # Si le fichier demande existe, Nginx le sert directement.
            # Sinon, la requete est envoyee a Laravel via public/index.php.
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            # Envoie les scripts PHP a PHP-FPM, qui ecoute sur 127.0.0.1:9000.
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
        }

        location ~ /\.(?!well-known).* {
            # Bloque l'acces aux fichiers caches comme .env, .git, etc.
            deny all;
        }
    }
}
