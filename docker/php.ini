# Memoire maximale utilisable par un script PHP.
memory_limit=256M

# Taille maximale d'un fichier envoye via formulaire.
upload_max_filesize=20M

# Taille maximale totale d'une requete POST.
post_max_size=20M

# Temps maximal d'execution d'une requete PHP.
max_execution_time=60

# Evite d'afficher la version de PHP dans les headers HTTP.
expose_php=0

# OPcache garde le code PHP compile en memoire.
# C'est important en production pour accelerer Laravel.
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000

# En production, on ne verifie pas les changements de fichiers a chaque requete.
# Sur Render, un nouveau deploy reconstruit l'image quand le code change.
opcache.validate_timestamps=0

# Necessaire pour certains frameworks/packages qui lisent les commentaires PHP.
opcache.save_comments=1
